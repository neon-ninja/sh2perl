# tidyperl Configuration for sh2perl Generated Code
# This configuration is optimized for the Perl code generated by sh2perl

# Basic formatting options
--indent-columns=4          # Use 4 spaces for indentation (matches sh2perl)
--maximum-line-length=120   # Reasonable line length for readability
--tabs=0                    # Use spaces, not tabs
--indent-spaces=4           # 4 spaces per indentation level

# Brace and bracket formatting
--brace-tightness=0         # Opening brace on same line as keyword
--paren-tightness=0         # Opening paren on same line as function
--square-bracket-tightness=0 # Opening bracket on same line

# Control structure formatting
--indent-blocks             # Indent blocks inside control structures
--indent-comments           # Indent comments with code
--cuddled-else              # Put else on same line as closing brace

# Line breaking and spacing
--line-up-parentheses       # Align parentheses vertically
--break-at-old-logical-breakpoints # Break at logical operators
--break-at-old-keyword-breakpoints # Break at keywords

# Variable and function formatting
--space-for-semicolon       # Add space before semicolon
--space-function-paren      # Add space between function name and paren
--space-after-keywords      # Add space after keywords like if, while, for

# String and quote formatting
--quote-word-bare           # Use bare words where possible
--backslash-for-nonquote    # Use backslash for non-quote characters

# Comment formatting
--indent-comments           # Indent comments with code
--cuddle-else               # Put else on same line as closing brace

# Specific formatting for sh2perl patterns
--space-after-semicolon     # Add space after semicolon
--space-after-comma         # Add space after comma
--space-after-if            # Add space after if
--space-after-while         # Add space after while
--space-after-for           # Add space after for

# Array and hash formatting
--space-after-array-bracket # Add space after array brackets
--space-after-hash-bracket  # Add space after hash brackets

# Subroutine formatting
--space-before-semicolon    # Add space before semicolon
--space-before-comma        # Add space before comma

# Block formatting
--indent-blocks             # Indent blocks inside control structures
--indent-comments           # Indent comments with code

# Output formatting
--standard-output           # Send formatted code to stdout
--standard-error-output     # Send errors to stderr
--quiet                     # Suppress non-error output

