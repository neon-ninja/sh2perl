# Perl::Critic configuration for sh2perl generated code
# This configuration is optimized for the Perl code generated by sh2perl

# Use Brutal level for maximum strictness
severity = 1

# Enable all policies at Brutal level
[TestingAndDebugging::RequireUseStrict]
[TestingAndDebugging::RequireUseWarnings]

# Code layout and formatting
[CodeLayout::RequireTidyCode]
[CodeLayout::ProhibitQuotedWordLists]
[CodeLayout::ProhibitTrailingWhitespace]

# Variables and scoping
[Variables::ProhibitUnusedVariables]
[Variables::ProhibitUnusedVarsFromArgs]
[Variables::ProhibitLocalVars]
[Variables::ProhibitPunctuationVars]

# Control structures
[ControlStructures::ProhibitCascadingIf]
[ControlStructures::ProhibitUnlessBlocks]
[ControlStructures::ProhibitPostfixControls]

# Subroutines
[Subroutines::ProhibitSubroutinePrototypes]
[Subroutines::ProhibitAmpersandSigils]
[Subroutines::ProhibitExplicitReturnUndef]

# Builtin functions
[BuiltinFunctions::ProhibitStringyEval]
[BuiltinFunctions::ProhibitStringySplit]
[BuiltinFunctions::ProhibitUselessTopic]

# Error handling
[ErrorHandling::RequireCarping]
[ErrorHandling::ProhibitWarnGrep]

# Documentation
[Documentation::RequirePodSections]
[Documentation::RequirePodLinksIncludeText]

# Performance
[Performance::ProhibitInterpolationOfLiterals]
[Performance::ProhibitReverseSortBlock]

# Security
[Security::RequireCheckedClose]
[Security::ProhibitTwoArgOpen]

# Values and expressions
[ValuesAndExpressions::ProhibitInterpolationOfLiterals]
[ValuesAndExpressions::ProhibitEmptyQuotes]

# Regular expressions
[RegularExpressions::ProhibitUnusedCapture]
[RegularExpressions::ProhibitUnescapedMetacharacters]

# Modules and pragmas
[Modules::RequireExplicitPackage]
[Modules::ProhibitAutomaticExportation]

# Naming conventions
[NamingConventions::ProhibitAmbiguousNames]
[NamingConventions::ProhibitMixedCaseSubs]

# Input output and file handling
[InputOutput::ProhibitBarewordFileHandles]
[InputOutput::ProhibitInteractiveTest]

# Misc
[Miscellanea::ProhibitFormats]
[Miscellanea::ProhibitTies]
