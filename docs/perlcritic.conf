severity = 1
#BRUTAL!!!

#--------------------------------------------------------------
# I think these are really important, so always load them
[TestingAndDebugging::RequireUseStrict]
severity = 5
[TestingAndDebugging::RequireUseWarnings]
severity = 5
#--------------------------------------------------------------
# I think these are less important, so only load when asked
[Variables::ProhibitPackageVars]
severity = 2
#--------------------------------------------------------------
# I do not agree with these at all, so never load them
#
# I feel we can keep the same variable names as in the Bash script
[-NamingConventions::Capitalization]

#If the original bash script has magic number, may as well keep them?
[-ValuesAndExpressions::ProhibitMagicNumbers]

#If you are translation a tiny shell script add a "Version" would just be noise
#Anyway, how would we make up a "Version"?
[-Perl::Critic::Policy::Modules::RequireVersionVar]

#Requiring checks that "print" succeeds is a bit of overkill, I feel
#Also and Lex/Parse approach isn't well suited to inventing
#error handling code that doesn't exist in the original.
[-Perl::Critic::Policy::InputOutput::RequireCheckedSyscalls]

#For generated code, we need to use double quotes to satisfy test requirements
#even though Perl::Critic thinks \n might be interpolation
[-ValuesAndExpressions::ProhibitInterpolationOfLiterals]

#If we *actually* need interpolation the equivalence test should pick it up
#This has way too many false positives.
[-ValuesAndExpressions::RequireInterpolationOfMetachars]

#We are a translator, not a refactoring tool :)
[-Perl::Critic::Policy::Modules::ProhibitExcessMainComplexity]

#For redirecting STDOUT/STDERR, two-argument open is the standard way
[-InputOutput::ProhibitTwoArgOpen]

#Generated scripts don't need to end with "1;"
[-Modules::RequireEndWithOne]

#Generated scripts don't need explicit packages
[-Modules::RequireExplicitPackage]

#Shebang line is not code that needs strict checking
[-TestingAndDebugging::RequireUseStrict]
[-TestingAndDebugging::RequireUseWarnings]

#Generated code may have literal line breaks in strings
[-ValuesAndExpressions::ProhibitInterpolationOfLiterals]

# Temporarily disabled: $CHILD_ERROR scoping issue in command substitution
# The mkdir command needs to set $CHILD_ERROR without 'local' to persist
# across conditional blocks for proper command substitution logic.
# TODO: Investigate proper solution for $CHILD_ERROR scoping in command substitution
[-Variables::RequireLocalizedPunctuationVars]

# Modern Perl function signatures are often preferred over @_ unpacking
# Function signatures like sub func($param) { } provide clear parameter
# declaration at function definition and more readable and maintainable
# code particularly for non-Perl programmers and polyglot programmers.
# You are of course free to disagree and use the debashc option 
#     --no-function-signatures
[-Subroutines::ProhibitSubroutinePrototypes]

# The perltidy check in perlcritic_wrapper.pl uses a Windows-only helper
# script that does not exist on Linux/macOS, so the check always fails on
# those platforms.  Disable the policy here so that the custom wrapper does
# not attempt the check at all.
[-CodeLayout::RequireTidyCode]

# Generated sort blocks for ls may be complex (e.g. Schwartzian transforms
# or time-based descending sorts).  Requiring a trivial { $a cmp $b } block
# or prohibiting $b before $a is not appropriate for generated code.
[-BuiltinFunctions::RequireSimpleSortBlock]
[-BuiltinFunctions::ProhibitReverseSortBlock]

# Generated map blocks may need more than one statement to faithfully
# translate the original bash logic (e.g. stripping trailing slashes inside
# a Schwartzian transform).
[-BuiltinFunctions::ProhibitComplexMappings]

# 'local *STDOUT;' is the standard Perl idiom for temporarily redirecting
# output in a block scope.  Requiring initialisation at the declaration
# site does not make sense here.
[-Variables::RequireInitializationForLocalVars]

# Generated tracking variables (e.g. $output_printed_N) may be declared
# as part of a shared template but not exercised by every generated code
# path.  Spurious "unused variable" warnings from static analysis are not
# useful for generated output.
[-Variables::ProhibitUnusedVariables]

# Adding /s, /x and /m flags to every generated regex would silently change
# the semantics of patterns (e.g. /m changes the meaning of ^ and $).
# Translating faithfully is more important than satisfying these style rules.
[-RegularExpressions::RequireDotMatchAnything]
[-RegularExpressions::RequireExtendedFormatting]
[-RegularExpressions::RequireLineBoundaryMatching]

# --- Policies not appropriate for generated code ---
# Parens on built-in calls (push, join, glob, etc.) improve readability in
# generated code even though the style guide prefers the bare form.
[-CodeLayout::ProhibitParensWithBuiltins]

# Postfix controls (last if ..., next if ...) are the natural translation of
# bash's break/continue inside conditionals.  Disabling this overrides the
# 'cruel' severity set above.
[-ControlStructures::ProhibitPostfixControls]

# Cascading if/elsif chains come directly from bash if/elif chains; generated
# code cannot be refactored to use a dispatch table.
[-ControlStructures::ProhibitCascadingIfElse]

# Bash functions use `return 0`/`return 1` as exit-status idioms; these
# are mechanically translated to Perl `return` statements that Perl::Critic
# may flag as unreachable when they follow conditional branches.
[-ControlStructures::ProhibitUnreachableCode]

# Generated strings may contain literal newlines from heredoc translation.
[-ValuesAndExpressions::ProhibitImplicitNewlines]

# Empty string '' is the natural translation of an empty bash string and is
# clearer than q{} in generated output.
[-ValuesAndExpressions::ProhibitEmptyQuotes]

# Single-character strings like '*' or ':' are clearer than q{*} / q{:} in
# generated code.
[-ValuesAndExpressions::ProhibitNoisyQuotes]

# Operator choice (e.g. mixing numeric and string comparisons) is driven by
# the semantics of the original bash expression.
[-ValuesAndExpressions::ProhibitMismatchedOperators]

# Generated code uses $_ implicitly in map/grep expressions exactly as bash
# naturally processes lists.  Marking it "useless" is a false positive.
[-BuiltinFunctions::ProhibitUselessTopic]

# Using grep in boolean context (if grep { ... } @arr) is idiomatic Perl and
# a natural translation of bash conditional constructs.
[-BuiltinFunctions::ProhibitBooleanGrep]

# qx{} is the correct and idiomatic translation of bash command substitution
# $(...).  Using IPC::Open3 for every substitution would be unnecessarily
# verbose in generated code.
[-InputOutput::ProhibitBacktickOperators]

# Generated code translates bash I/O faithfully; checking the return value
# of every close call would add noise that has no counterpart in the source.
[-InputOutput::RequireCheckedClose]

# bash character classes such as [a-z] translate directly to Perl enumerated
# classes; rewriting them as POSIX classes would change semantics.
[-RegularExpressions::ProhibitEnumeratedClasses]

# Escaped metacharacters (e.g. \.) in regex come directly from bash patterns
# and should not be silently converted to [.] by a style rule.
[-RegularExpressions::ProhibitEscapedMetacharacters]

# Generated capture groups ($1, $2, ...) mirror bash's own regex captures;
# testing whether the match succeeded before using $1 is not required here.
[-RegularExpressions::ProhibitCaptureWithoutTest]

# @{$ref} double-sigil dereference is required for array references in
# generated code and cannot easily be replaced.
[-References::ProhibitDoubleSigils]

# Variable name reuse across nested generated scopes is expected and does
# not indicate a bug in the translated code.
[-Variables::ProhibitReusedNames]

# Generated code may use $/ and $! directly; the English module equivalents
# are already imported for the cases where they are used by name, but some
# inner generated patterns (local $/ = undef) rely on the short forms.
[-Variables::ProhibitPunctuationVars]

# Conditional declarations (my $x if ...) can appear in generated control
# flow that does not have a clean rewrite.
[-Variables::ProhibitConditionalDeclarations]

# Generated code may use die in contexts where the original bash would exit;
# switching every die to croak would change call-stack reporting semantics.
[-ErrorHandling::RequireCarping]

# Generated subroutines may access @_ positionally rather than unpacking it
# into named variables.
[-Subroutines::RequireArgUnpacking]

# Nested sub definitions can appear in generated output for closures that
# capture loop variables from the translated bash script.
[-Subroutines::ProhibitNestedSubs]

# 'print do { ... }' is valid Perl but Perl::Critic mistakes the 'do' block
# for an unbraced bareword filehandle.  The generator already uses braced
# handles (print {*STDERR} / print {$fh}) where a real handle is involved;
# this entry covers the remaining false-positive for 'print do { ... }'.
[-InputOutput::RequireBracedFileHandleWithPrint]

#--------------------------------------------------------------
# For all other Policies, I accept the default severity,
# so no additional configuration is required for them.